name: frontend
description: Doomscroll-free news Flutter app frontend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  go_router: ^14.2.7
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2
  url_launcher: ^6.3.0
  flutter_tts: ^4.2.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

